# Nome do workflow (conforme Exercício 5 da Aula 3)
name: CI com ESLint

# Eventos que disparam o workflow
on:
  push:
    branches: [ dev ] # dispara apenas quando o commit é na branch dev
  pull_request:
    branches: [ dev ] # dispara quando há PR para dev

jobs:
  # Definindo o job de linting
  lint:
    runs-on: ubuntu-latest # ambiente Linux
    
    steps:
      # 1. Baixar o código do repositório
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Instalar Node.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Atualizado para a versão estável que você está usando

      # 3. Instalar dependências (Necessário para o ESLint encontrar os plugins)
      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      # 4. Rodar ESLint (O "robô" agora verifica seu código automaticamente)
      - name: Rodar ESLint
        run: npx eslint .