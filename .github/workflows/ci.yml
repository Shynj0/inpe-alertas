# Nome do workflow (conforme Exercício 2 da Aula 3)
name: CI Simples

# Eventos que disparam o workflow (conforme Exercício 2 e 5 da Aula 3)
on:
  push:
    branches: [ dev ] # dispara apenas quando o commit é na branch dev
  pull_request:
    branches: [ dev ] # dispara quando há PR para dev

jobs:
  # Definindo um job chamado "build"
  build:
    runs-on: ubuntu-latest # ambiente Linux (conforme Exercício 2 da Aula 3)
    
    steps:
      # 1. Baixar o código do repositório (conforme Exercício 2 da Aula 3)
      - name: Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configurar o ambiente Node.js (conforme Exercício 2 da Aula 2)
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Teste de funcionamento personalizado (conforme Exercício 4 da Aula 3)
      - name: Teste de funcionamento
        run: echo "Pipeline do projeto INPE executado com sucesso!"
